<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Login</title>
</head>

<body>

<h2>Login Page</h2>

<form th:action="@{/login}"
      method="post">

    Username :
    <input type="text"
           name="username">
    <br><br>

    Password :
    <input type="password"
           name="password">
    <br><br>

    <button type="submit">
        Login
    </button>

</form>

<br><br>

<a href="/register">
    New User ? Register
</a>

</body>
</html>
